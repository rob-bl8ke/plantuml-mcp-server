services:
  # PlantUML rendering server
  plantuml-server:
    image: plantuml/plantuml-server:latest
    container_name: plantuml-server
    ports:
      - "9090:8080"
    environment:
      - BASE_URL=plantuml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Encoding service
  encoder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plantuml-encoder
    ports:
      - "9091:3000"
    environment:
      - PORT=3000
      - PLANTUML_SERVER=http://localhost:9090/plantuml
    depends_on:
      - plantuml-server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
